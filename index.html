<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>谢宝新 - 简历</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="page">
    <header class="header no-print">
      <button type="button" id="langSwitch" class="lang-switch" aria-label="Switch language">English</button>
    </header>

    <main class="main">
      <section class="hero">
        <h1 id="name" class="name"></h1>
        <p id="basicsLine" class="basics-line"></p>
        <p id="targetRole" class="target-role"></p>
        <p id="tagline" class="tagline"></p>
        <div id="contact" class="contact"></div>
      </section>

      <section id="highlight" class="highlight">
        <h2 id="highlightTitle" class="section-title"></h2>
        <div class="highlight-card">
          <div class="highlight-head">
            <span id="highlightCompany" class="company"></span>
            <span id="highlightPeriod" class="period"></span>
          </div>
          <p id="highlightRole" class="role"></p>
          <div id="highlightProducts" class="products"></div>
          <div class="metrics">
            <p id="metricPlay" class="metric"></p>
            <p id="metricAppstore" class="metric"></p>
          </div>
          <div class="charts-row">
            <figure class="chart-fig">
              <img src="assets/chart-play.png" alt="Google Play installed users" class="chart-img">
              <figcaption id="chartPlayLabel" class="chart-caption"></figcaption>
            </figure>
            <figure class="chart-fig">
              <img src="assets/chart-appstore.png" alt="App Store downloads" class="chart-img">
              <figcaption id="chartAppstoreLabel" class="chart-caption"></figcaption>
            </figure>
          </div>
          <p id="aiNote" class="ai-note"></p>
        </div>
      </section>

      <section id="experience" class="experience">
        <h2 id="experienceTitle" class="section-title"></h2>
        <ul id="experienceList" class="exp-list"></ul>
      </section>

      <section id="skills" class="skills">
        <h2 id="skillsTitle" class="section-title"></h2>
        <p id="skillsLead" class="skills-lead"></p>
        <p id="skillsTech" class="skills-tech"></p>
        <p id="skillsDomain" class="skills-domain"></p>
      </section>

      <section id="education" class="education">
        <h2 id="educationTitle" class="section-title"></h2>
        <p id="educationContent" class="education-content"></p>
      </section>

      <section id="attachments" class="attachments">
        <h2 id="attachmentsTitle" class="section-title"></h2>
        <p id="attachmentsLinks" class="attachments-links"></p>
      </section>
    </main>
    <footer class="resume-footer no-print">
      <span class="footer-note">谢宝新 · Xie Baoxin</span>
    </footer>
  </div>
  <script src="js/main.js"></script>
</body>
</html>
